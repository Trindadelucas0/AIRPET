<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem Conexao | AIRPET</title>
  <meta name="theme-color" content="#ec5a1c">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #374151; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
    .container { max-width: 360px; }
    .icon-box { width: 80px; height: 80px; border-radius: 20px; background: #fff3ed; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon-box svg { width: 40px; height: 40px; }
    h1 { font-size: 22px; font-weight: 800; color: #111827; margin-bottom: 8px; }
    p { font-size: 15px; color: #6b7280; line-height: 1.5; margin-bottom: 24px; }
    button { background: #ec5a1c; color: #fff; border: none; padding: 12px 28px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #d4500f; }
    .paw { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="paw">🐾</div>
    <h1>Voce esta offline</h1>
    <p>Parece que voce perdeu a conexao com a internet. Verifique sua rede e tente novamente.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
